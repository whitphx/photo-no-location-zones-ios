name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Build & test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest installed Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            echo "No /Applications/Xcode_*.app found; using whatever xcode-select points at" >&2
          else
            echo "Selecting $LATEST"
            sudo xcode-select -s "$LATEST"
          fi

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve simulator destination
        id: sim
        run: |
          # Pick an available iPhone simulator running the latest installed iOS.
          DEST=$(xcrun simctl list devices available | awk '
            /-- iOS / { ios = $0 }
            /iPhone/ && /\(/ { print ios " :: " $0 }
          ' | tail -1)
          echo "Picked: $DEST"
          NAME=$(echo "$DEST" | sed -E 's/.*:: ([^(]+) \(.*/\1/' | xargs)
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        env:
          SIM_NAME: ${{ steps.sim.outputs.name }}
        run: |
          xcodebuild test \
            -scheme PhotoNoLocationZones \
            -destination "platform=iOS Simulator,name=${SIM_NAME},OS=latest" \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults.xcresult
          path: TestResults.xcresult
