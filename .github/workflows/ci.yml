name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Build & test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest installed Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            echo "No /Applications/Xcode_*.app found; using whatever xcode-select points at" >&2
          else
            echo "Selecting $LATEST"
            sudo xcode-select -s "$LATEST"
          fi

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Run unit tests
        run: |
          # `OS=latest` is unreliable with `name=` matching; let xcodebuild
          # pick the OS for us by giving it just the device name. iPhone 16
          # is broadly available across the OS versions GitHub macos-15
          # runners ship today.
          xcodebuild test \
            -scheme PhotoNoLocationZones \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults.xcresult
          path: TestResults.xcresult
