name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Build & test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest installed Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            echo "No /Applications/Xcode_*.app found; using whatever xcode-select points at" >&2
          else
            echo "Selecting $LATEST"
            sudo xcode-select -s "$LATEST"
          fi

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Run unit tests
        run: |
          # Hardcoded simulator name — periodically needs updating as Apple
          # rotates the device family. As of 2026-05 the macos-15 runner has
          # iPhone 17 / 17 Pro / 17 Pro Max / 17e / Air; the prior image had
          # iPhone 16 which is no longer present. If this step starts failing
          # with "Unable to find a device matching the provided destination
          # specifier", check `xcrun simctl list devices available` on a fresh
          # macos-15 runner and pick a name from the iPhone family.
          xcodebuild test \
            -scheme PhotoNoLocationZones \
            -destination "platform=iOS Simulator,name=iPhone 17" \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults.xcresult
          path: TestResults.xcresult
